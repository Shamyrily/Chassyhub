<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Chess Game</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #d4a574 0%, #8b6f47 100%);
            min-height: 100vh;
        }
        
        .status {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c1810;
            text-align: center;
        }
        
        #board {
            width: 340px;
            max-width: 90vw;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 4px;
        }
        
        .white-1e1d7 {
            background-color: #e8d4b8 !important;
        }
        
        .black-3c85d {
            background-color: #6b4423 !important;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #5c4033;
            color: #f4e4c1;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #6b4423;
        }
        
        .mode-selection, .hidden {
            display: none;
        }
        
        .mode-selection.active, .hidden.active {
            display: flex;
        }
        
        .mode-selection {
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        
        .mode-selection h1 {
            font-size: 36px;
            color: #2c1810;
            margin-bottom: 30px;
        }
        
        .mode-btn {
            padding: 20px 40px;
            font-size: 20px;
            min-width: 280px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="modeSelection" class="mode-selection active">
        <h1>♔ Шахматы</h1>
        <button class="mode-btn" onclick="startGame('bot')">🤖 Играть с ботом</button>
        <button class="mode-btn" onclick="startGame('local')">👥 Играть с другом</button>
    </div>

    <div id="gameScreen" class="hidden">
        <div class="status" id="status">Загрузка...</div>
        <div id="board"></div>
        <div class="controls">
            <button onclick="resetGame()">Новая игра</button>
            <button onclick="undoMove()">Отменить ход</button>
            <button onclick="backToMenu()">В меню</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const game = new Chess();
        let board = null;
        let gameMode = null;

        function startGame(mode) {
            try {
                gameMode = mode;
                document.getElementById('modeSelection').classList.remove('active');
                document.getElementById('gameScreen').classList.add('active');
                game.reset();
                initBoard();
                updateStatus();
                console.log('Game started in mode:', mode);
            } catch (e) {
                console.error('Error starting game:', e);
                alert('Ошибка: ' + e.message);
            }
        }

        function backToMenu() {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('modeSelection').classList.add('active');
            if (board) {
                board.destroy();
                board = null;
            }
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        function undoMove() {
            game.undo();
            if (gameMode === 'bot') {
                game.undo();
            }
            board.position(game.fen());
            updateStatus();
        }

        function updateStatus() {
            let status = '';
            if (game.in_checkmate()) {
                status = '♔ Мат! Победил ' + (game.turn() === 'w' ? 'чёрный' : 'белый');
            } else if (game.in_draw()) {
                status = '⚖ Ничья';
            } else if (game.in_check()) {
                status = '⚠ Шах! Ход ' + (game.turn() === 'w' ? 'белых' : 'чёрных');
            } else {
                status = '♟ Ход ' + (game.turn() === 'w' ? 'белых' : 'чёрных');
            }
            document.getElementById('status').textContent = status;
        }

        function onDragStart(source, piece) {
            if (game.game_over()) return false;
            if (gameMode === 'bot' && game.turn() === 'b') return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            return true;
        }

        function onDrop(source, target) {
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            updateStatus();
            
            if (gameMode === 'bot' && game.turn() === 'b' && !game.game_over()) {
                setTimeout(makeBotMove, 500);
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function makeBotMove() {
            const moves = game.moves();
            if (moves.length === 0) return;
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            game.move(randomMove);
            board.position(game.fen());
            updateStatus();
        }

        function initBoard() {
            try {
                const config = {
                    draggable: true,
                    position: 'start',
                    pieceTheme: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Chess_%7Bpiece%7Ddt45.svg/60px-Chess_%7Bpiece%7Ddt45.svg.png',
                    onDragStart: onDragStart,
                    onDrop: onDrop,
                    onSnapEnd: onSnapEnd
                };
                
                board = Chessboard('board', config);
                console.log('Board initialized');
            } catch (e) {
                console.error('Error initializing board:', e);
                alert('Ошибка инициализации доски: ' + e.message);
            }
        }

        window.addEventListener('resize', function() {
            if (board) board.resize();
        });

        console.log('Script loaded successfully');
    </script>
</body>
</html>
