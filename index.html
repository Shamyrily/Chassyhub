<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Chess Web App</title>
    <!-- Стили для шахматной доски chessboard.js -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--tg-theme-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
        #board {
            width: 320px;
            max-width: 100%;
            margin-bottom: 20px;
            touch-action: none; /* Отключаем системные жесты для лучшего drag-and-drop */
        }
        .status {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
            text-align: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="status" id="status">Ход белых</div>
    <!-- Сюда отрисуется доска -->
    <div id="board"></div>
    
    <div class="controls">
        <button id="resetBtn">Новая игра</button>
        <button id="undoBtn">Отменить ход</button>
    </div>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- JQuery (нужен для chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Библиотека отрисовки доски chessboard.js -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <!-- Библиотека шахматной логики chess.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        // Сообщаем Telegram, что приложение готово
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран

        // Инициализируем логику игры (chess.js)
        const game = new Chess();
        let board = null;

        // Функция обновления статуса игры
        function updateStatus() {
            let status = '';
            
            if (game.in_checkmate()) {
                status = 'Мат! Игра окончена. Победил ' + (game.turn() === 'w' ? 'чёрный' : 'белый') + '!';
                tg.HapticFeedback.impactOccurred('heavy');
            } else if (game.in_draw()) {
                status = 'Ничья!';
                tg.HapticFeedback.notificationOccurred('warning');
            } else if (game.in_stalemate()) {
                status = 'Пат! Ничья.';
                tg.HapticFeedback.notificationOccurred('warning');
            } else if (game.in_threefold_repetition()) {
                status = 'Ничья по троекратному повторению позиции.';
                tg.HapticFeedback.notificationOccurred('warning');
            } else if (game.insufficient_material()) {
                status = 'Ничья: недостаточно фигур для мата.';
                tg.HapticFeedback.notificationOccurred('warning');
            } else if (game.in_check()) {
                status = 'Шах! Ход ' + (game.turn() === 'w' ? 'белых' : 'чёрных');
                tg.HapticFeedback.impactOccurred('medium');
            } else {
                status = 'Ход ' + (game.turn() === 'w' ? 'белых' : 'чёрных');
            }
            
            document.getElementById('status').textContent = status;
        }

        // Обработчик начала перетаскивания
        function onDragStart(source, piece, position, orientation) {
            // Не даём перетаскивать фигуры, если игра окончена
            if (game.game_over()) return false;
            
            // Не даём перетаскивать чужие фигуры (не того цвета, чей сейчас ход)
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            
            // Разрешаем перетаскивание
            tg.HapticFeedback.impactOccurred('light');
            return true;
        }

        // Обработчик отпускания фигуры
        function onDrop(source, target) {
            // Пытаемся сделать ход
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Всегда продвигаем пешку в ферзя (можно сделать выбор)
            });

            // Если ход нелегальный, возвращаем фигуру на исходную позицию
            if (move === null) {
                tg.HapticFeedback.notificationOccurred('error');
                return 'snapback';
            }

            // Ход успешен, обновляем статус
            tg.HapticFeedback.impactOccurred('medium');
            updateStatus();
        }

        // Обработчик завершения анимации (когда фигура встала на место)
        function onSnapEnd() {
            // Обновляем позицию на доске в соответствии с состоянием игры
            board.position(game.fen());
        }

        // Конфигурация шахматной доски
        const config = {
            draggable: true, // Включаем Drag-and-Drop
            position: 'start', // Начальная позиция
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png' // Тема фигур
        };

        // Инициализируем доску
        board = Chessboard('board', config);
        updateStatus();

        // Обработчик кнопки "Новая игра"
        document.getElementById('resetBtn').addEventListener('click', function() {
            game.reset();
            board.start();
            updateStatus();
            tg.HapticFeedback.impactOccurred('medium');
        });

        // Обработчик кнопки "Отменить ход"
        document.getElementById('undoBtn').addEventListener('click', function() {
            game.undo();
            board.position(game.fen());
            updateStatus();
            tg.HapticFeedback.impactOccurred('light');
        });

        // Обработка изменения размера экрана (например, при повороте устройства)
        window.addEventListener('resize', function() {
            board.resize();
        });
    </script>
</body>
</html>
