<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Vintage Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #d4a574 0%, #8b6f47 100%);
            color: #2c1810;
            padding: 20px;
        }
        
        .status {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            color: #2c1810;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }
        
        #board {
            width: 340px;
            max-width: 90vw;
            margin-bottom: 25px;
            touch-action: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 0 8px #5c4033, 0 0 0 12px #8b6f47;
            border-radius: 4px;
        }
        
        .white-1e1d7 {
            background-color: #e8d4b8 !important;
        }
        
        .black-3c85d {
            background-color: #6b4423 !important;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 12px 28px;
            font-size: 16px;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            background: linear-gradient(135deg, #8b6f47 0%, #5c4033 100%);
            color: #f4e4c1;
            border: 2px solid #2c1810;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: linear-gradient(135deg, #a0826d 0%, #6b4423 100%);
            transform: translateY(-2px);
        }
        
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }
        
        .mode-selection h1 {
            font-size: 36px;
            color: #2c1810;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }
        
        .mode-btn {
            padding: 20px 40px;
            font-size: 20px;
            min-width: 280px;
        }
        
        .mode-btn .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        
        .mode-btn .title {
            font-size: 22px;
            font-weight: 700;
        }
        
        .mode-btn .desc {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="modeSelection" class="mode-selection">
        <h1>♔ Шахматы</h1>
        <button class="mode-btn" onclick="startGame('bot')">
            <span class="icon">🤖</span>
            <span class="title">Играть с ботом</span>
            <span class="desc">Против компьютера</span>
        </button>
        <button class="mode-btn" onclick="startGame('local')">
            <span class="icon">👥</span>
            <span class="title">Играть с другом</span>
            <span class="desc">Два игрока на одном устройстве</span>
        </button>
    </div>

    <div id="gameScreen" class="hidden">
        <div class="status" id="status">Загрузка...</div>
        <div id="board"></div>
        <div class="controls">
            <button onclick="resetGame()">Новая игра</button>
            <button onclick="undoMove()">Отменить ход</button>
            <button onclick="backToMenu()">В меню</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('modeSelection').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            game.reset();
            initBoard();
            updateStatus();
        }

        function backToMenu() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('modeSelection').classList.remove('hidden');
            if (board) {
                board.destroy();
                board = null;
            }
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        function undoMove() {
            game.undo();
            if (gameMode === 'bot') {
                game.undo();
            }
            board.position(game.fen());
            updateStatus();
        }

        function updateStatus() {
            let status = '';
            if (game.in_checkmate()) {
                status = '♔ Мат! Победил ' + (game.turn() === 'w' ? 'чёрный' : 'белый');
            } else if (game.in_draw()) {
                status = '⚖ Ничья';
            } else if (game.in_check()) {
                status = '⚠ Шах! Ход ' + (game.turn() === 'w' ? 'белых' : 'чёрных');
            } else {
                status = '♟ Ход ' + (game.turn() === 'w' ? 'белых' : 'чёрных');
            }
            document.getElementById('status').textContent = status;
        }

        function onDragStart(source, piece) {
            if (game.game_over()) return false;
            if (gameMode === 'bot' && game.turn() === 'b') return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            return true;
        }

        function onDrop(source, target) {
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            updateStatus();
            
            if (gameMode === 'bot' && game.turn() === 'b' && !game.game_over()) {
                setTimeout(makeBotMove, 500);
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function makeBotMove() {
            const moves = game.moves();
            if (moves.length === 0) return;
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            game.move(randomMove);
            board.position(game.fen());
            updateStatus();
        }

        function initBoard() {
            const config = {
                draggable: true,
                position: 'start',
                pieceTheme: function(piece) {
                    return pieces[piece];
                },
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };
            
            board = Chessboard('board', config);
        }

        window.addEventListener('resize', function() {
            if (board) board.resize();
        });
    </script>
</body>
</html>
